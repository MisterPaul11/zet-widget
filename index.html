<!DOCTYPE html>
<html lang="hr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZET Info</title>

<style>

html,body{
    margin:0;
    padding:0;
    background:transparent;
    overflow:hidden;
    font-family:Arial,sans-serif;
}

#container{
    padding:16px;
}

#zet{
    background:#005ca9;
    color:white;

    padding:
        38px
        60px;

    text-align:center;

    font-size:18px;
    line-height:1.8;

    box-shadow:
        0 8px 24px rgba(0,0,0,0.25);
}

</style>
</head>

<body>

<div id="container">

    <div id="zet">
        Učitavanje ZET informacija...
    </div>

</div>

<script>

async function loadZET(){

    try{

        const response = await fetch(
            "https://corsproxy.io/?https://www.zet.hr/"
        );

        const html =
            await response.text();

        const parser =
            new DOMParser();

        const doc =
            parser.parseFromString(
                html,
                "text/html"
            );

        const bodyText =
            doc.body.innerText;

        const lines =
            bodyText
                .split("\n")
                .map(
                    l => l.trim()
                )
                .filter(
                    l => l.length > 25
                );

        let found =
            "Nema trenutnih prometnih obavijesti.";

        for(let line of lines){

            const lower =
                line.toLowerCase();

            if(

                lower.includes("zastoj") ||
                lower.includes("izmjene") ||
                lower.includes("obilazno") ||
                lower.includes("prekid") ||
                lower.includes("kašnjenje") ||
                lower.includes("radovi") ||
                lower.includes("sljeme") ||
                lower.includes("žičare") ||
                lower.includes("linija")

            ){

                found = line;
                break;

            }

        }

        document.getElementById("zet")
            .innerHTML =
            found;

    }catch(e){

        document.getElementById("zet")
            .innerHTML =
            "Greška pri dohvaćanju ZET podataka.";

    }

}

loadZET();

setInterval(
    loadZET,
    300000
);

</script>

</body>
</html>
