<!DOCTYPE html>
<html lang="hr">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<meta http-equiv="refresh"
      content="300">

<title>ZET Info</title>

<style>

html,
body{

    margin:0;
    padding:0;

    background:transparent;

    overflow:hidden;

    font-family:
        'Open Sans',
        Arial,
        sans-serif;

}

#zet{

    background:#005ca9;

    color:white;

    width:100%;

    box-sizing:border-box;

    padding:
        38px
        55px;

    text-align:center;

    font-size:16px;

    line-height:2;

    box-shadow:
        0 10px 24px rgba(0,0,0,0.22);

}

#zet a{

    color:white;

}

#zet p{

    margin:0;

}

</style>

</head>

<body>

<div id="zet">

    Učitavanje ZET informacija...

</div>

<script>

async function loadZET(){

    try{

        const response =
            await fetch(
                "https://corsproxy.io/?https://www.zet.hr/"
            );

        const html =
            await response.text();

        const parser =
            new DOMParser();

        const doc =
            parser.parseFromString(
                html,
                "text/html"
            );

        const alertBoxes =
            doc.querySelectorAll(
                ".warning-content"
            );

        let alertBox =
            null;

        alertBoxes.forEach(box => {

            const text =
                box.innerText
                    .toLowerCase();

            if(

                text.includes(
                    "servisne informacije"
                ) ||

                text.includes(
                    "072 500 400"
                ) ||

                text.includes(
                    "sada.zgh.hr"
                ) ||

                text.includes(
                    "žičare"
                ) ||

                text.includes(
                    "sljeme"
                )

            ){

                alertBox =
                    box;

            }

        });

        let found =
            "Nema trenutnih obavijesti.";

        if(alertBox){

            found =
                alertBox.innerHTML;

        }

        document
            .getElementById("zet")
            .innerHTML =
            found;

    }catch(e){

        document
            .getElementById("zet")
            .innerHTML =
            "Greška pri dohvaćanju ZET podataka.";

    }

}

loadZET();

setInterval(
    loadZET,
    300000
);

</script>

</body>
</html>
